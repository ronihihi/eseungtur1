openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: E-Sign Workflow API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: documents
    description: Document management
  - name: recipients
    description: Recipient management
  - name: signing
    description: Public signing flow
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: Registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"

  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List all documents for the current user
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: uploadDocument
      tags: [documents]
      summary: Upload a new document
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                document:
                  type: string
                  format: binary
                title:
                  type: string
                signing_order:
                  type: string
                  enum: [sequential, simultaneous]
              required:
                - document
      responses:
        "200":
          description: Document uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadDocumentResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /documents/{id}:
    get:
      operationId: getDocument
      tags: [documents]
      summary: Get a document with its recipients
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Document detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentDetailResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /documents/{id}/recipients:
    post:
      operationId: setRecipients
      tags: [recipients]
      summary: Set recipients for a document (replaces existing)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetRecipientsRequest"
      responses:
        "200":
          description: Recipients set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /documents/{id}/send:
    post:
      operationId: sendDocument
      tags: [documents]
      summary: Send signing emails to recipients
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendDocumentRequest"
      responses:
        "200":
          description: Emails sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendDocumentResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /documents/{id}/status:
    get:
      operationId: getDocumentStatus
      tags: [documents]
      summary: Get signing status for a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentStatusResponse"

  /recipients/{recipientId}/remind:
    post:
      operationId: remindRecipient
      tags: [recipients]
      summary: Send a reminder email to a recipient
      parameters:
        - name: recipientId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Reminder sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sign/{token}:
    get:
      operationId: getSigningInfo
      tags: [signing]
      summary: Get signing info for a recipient token
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Signing info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SigningInfoResponse"
        "404":
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: submitSignature
      tags: [signing]
      summary: Submit a signature for a recipient token
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitSignatureRequest"
      responses:
        "200":
          description: Signed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Already signed or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    RegisterRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
      required:
        - name
        - email
        - password

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
      required:
        - id
        - name
        - email

    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
        user:
          $ref: "#/components/schemas/User"
      required:
        - success
        - user

    MeResponse:
      type: object
      properties:
        user:
          nullable: true
          oneOf:
            - $ref: "#/components/schemas/User"
            - type: "null"
      required:
        - user

    Recipient:
      type: object
      properties:
        id:
          type: string
        documentId:
          type: string
        teamName:
          type: string
        email:
          type: string
        signOrder:
          type: integer
        status:
          type: string
          enum: [pending, viewed, signed]
        token:
          type: string
        signedAt:
          type: string
          nullable: true
        viewedAt:
          type: string
          nullable: true
        signerName:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - documentId
        - teamName
        - email
        - signOrder
        - status
        - token
        - createdAt

    Document:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        filename:
          type: string
        signingOrder:
          type: string
          enum: [sequential, simultaneous]
        status:
          type: string
          enum: [draft, sent, completed]
        uploadedBy:
          type: string
        uploaderName:
          type: string
        createdAt:
          type: string
        completedAt:
          type: string
          nullable: true
        totalRecipients:
          type: integer
        signedCount:
          type: integer
      required:
        - id
        - title
        - filename
        - signingOrder
        - status
        - uploadedBy
        - uploaderName
        - createdAt
        - totalRecipients
        - signedCount

    DocumentListResponse:
      type: object
      properties:
        documents:
          type: array
          items:
            $ref: "#/components/schemas/Document"
      required:
        - documents

    UploadDocumentResponse:
      type: object
      properties:
        success:
          type: boolean
        documentId:
          type: string
      required:
        - success
        - documentId

    DocumentDetailResponse:
      type: object
      properties:
        document:
          $ref: "#/components/schemas/Document"
        recipients:
          type: array
          items:
            $ref: "#/components/schemas/Recipient"
      required:
        - document
        - recipients

    RecipientInput:
      type: object
      properties:
        teamName:
          type: string
        email:
          type: string
          format: email
      required:
        - teamName
        - email

    SetRecipientsRequest:
      type: object
      properties:
        recipients:
          type: array
          items:
            $ref: "#/components/schemas/RecipientInput"
          maxItems: 7
      required:
        - recipients

    SendDocumentRequest:
      type: object
      properties:
        subject:
          type: string
        message:
          type: string

    SendDocumentResponse:
      type: object
      properties:
        success:
          type: boolean
        sent:
          type: integer
      required:
        - success
        - sent

    DocumentStatusResponse:
      type: object
      properties:
        recipients:
          type: array
          items:
            $ref: "#/components/schemas/Recipient"
        status:
          type: string
      required:
        - recipients
        - status

    SigningInfoResponse:
      type: object
      properties:
        recipient:
          $ref: "#/components/schemas/Recipient"
        documentTitle:
          type: string
        alreadySigned:
          type: boolean
      required:
        - recipient
        - documentTitle
        - alreadySigned

    SubmitSignatureRequest:
      type: object
      properties:
        fullName:
          type: string
        signatureData:
          type: string
          description: Base64-encoded signature image
      required:
        - fullName
        - signatureData
